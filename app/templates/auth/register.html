{% extends "base.html" %}

{% block title %}Register — VitalSync{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card auth-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="auth-icon-wrap mb-3">
                    <i class="bi bi-person-plus-fill auth-icon"></i>
                </div>
                <h2 class="fw-700 mb-1">Create Account</h2>
                <p class="text-muted small">Start your wellness journey today</p>
            </div>

            <form method="POST" action="{{ url_for('auth.register') }}" id="register-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="email" class="form-label small fw-500">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-icon"><i class="bi bi-envelope-fill"></i></span>
                        <input type="email" class="form-control glass-input" id="email" name="email"
                               placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label small fw-500">Password</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-icon"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control glass-input" id="password" name="password"
                               placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label small fw-500">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-icon"><i class="bi bi-shield-lock-fill"></i></span>
                        <input type="password" class="form-control glass-input" id="confirm_password" name="confirm_password"
                               placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="role" class="form-label small fw-500">Account Type</label>
                    <select class="form-select glass-input" id="role" name="role">
                        <option value="user" selected>Regular User — Track my health</option>
                        <option value="reviewer">Health Reviewer — Review others' charts</option>
                    </select>
                    <div class="form-text text-muted mt-1" id="role-hint">
                        <i class="bi bi-info-circle me-1"></i>
                        <span id="role-hint-text">Full access to quizzes, dashboard, chatbot, and AI suggestions.</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-pill glow-btn py-2" id="register-submit">
                    <i class="bi bi-person-plus-fill me-2"></i>Create Account
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}" class="text-primary fw-500">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('role').addEventListener('change', function() {
        const hint = document.getElementById('role-hint-text');
        if (this.value === 'reviewer') {
            hint.textContent = 'Reviewer accounts require admin approval before activation.';
        } else {
            hint.textContent = 'Full access to quizzes, dashboard, chatbot, and AI suggestions.';
        }
    });
</script>
{% endblock %}
